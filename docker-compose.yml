services:
  haproxy:
    image: haproxy:3.0-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./infra/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "32MB"

  api1:
    build: .
    environment:
      APP_ROLE: "api"
      LISTEN_ADDR: ":8080"
      REDIS_ADDR: "valkey:6379"
      MAX_QUEUE_DEPTH: "18000"
    depends_on:
      - valkey
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.24"
          memory: "52MB"

  api2:
    build: .
    environment:
      APP_ROLE: "api"
      LISTEN_ADDR: ":8080"
      REDIS_ADDR: "valkey:6379"
      MAX_QUEUE_DEPTH: "18000"
    depends_on:
      - valkey
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.24"
          memory: "52MB"

  worker:
    build: .
    environment:
      APP_ROLE: "worker"
      REDIS_ADDR: "valkey:6379"
      WORKERS: "32"
      MAX_PROCESSOR_CONNS: "64"
      PROCESSOR_TIMEOUT_MS: "10000"
      PROCESSING_LEASE_MS: "25000"
      PROCESSOR_HEALTH_GRACE_MS: "1200"
      FALLBACK_QUEUE_SIZE: "200"
      PROCESSOR_DEFAULT_URL: "http://payment-processor-default:8080"
      PROCESSOR_FALLBACK_URL: "http://payment-processor-fallback:8080"
    depends_on:
      - valkey
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.42"
          memory: "64MB"

  valkey:
    image: valkey/valkey:8.1-alpine
    command: ["valkey-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "noeviction"]
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: "150MB"

networks:
  backend:
    driver: bridge
  payment-processor:
    external: true
